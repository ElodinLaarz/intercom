name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: flutter
    steps:
      - name: Checkout PR head (manual — JS actions unavailable on this runner)
        run: |
          set -e
          SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          echo "Building sha: $SHA"
          git init .
          git fetch --depth 1 http://forgejo:3000/laarz/intercom.git "$SHA"
          git checkout FETCH_HEAD
          git log -1 --format='checked out: %H %s'

      - name: Runner environment
        run: |
          set -e
          java -version 2>&1 || { echo "FATAL: no java on runner"; exit 1; }
          echo "ANDROID_HOME=${ANDROID_HOME:-unset}"
          echo "sdk.dir=${ANDROID_HOME}" > local.properties

      - name: Install NDK + cmake (sdkmanager)
        run: |
          set -e
          SDK="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          SM="$(ls "$SDK"/cmdline-tools/latest/bin/sdkmanager 2>/dev/null \
             || ls "$SDK"/cmdline-tools/*/bin/sdkmanager 2>/dev/null \
             || command -v sdkmanager || true)"
          if [ -z "$SM" ]; then echo "FATAL: sdkmanager not found under $SDK"; exit 1; fi
          echo "sdkmanager: $SM"
          yes | "$SM" --licenses >/dev/null 2>&1 || true
          "$SM" --install "ndk;27.2.12479018" "cmake;3.22.1"
          echo "installed:"; ls "$SDK/ndk" "$SDK/cmake"

      - name: Preflight (bootstrap — fail loud)
        run: bash scripts/bootstrap.sh

      - name: Native host tests (ctest)
        run: |
          set -e
          SDK="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          CMAKE="$(ls "$SDK"/cmake/3.22.1/bin/cmake 2>/dev/null || command -v cmake || true)"
          if [ -z "$CMAKE" ]; then echo "FATAL: no cmake"; exit 1; fi
          CTEST="$(dirname "$CMAKE")/ctest"  # ctest ships beside cmake, not on PATH
          if ! command -v c++ >/dev/null 2>&1 \
             && ! command -v g++ >/dev/null 2>&1 \
             && ! command -v clang++ >/dev/null 2>&1; then
            echo "no host C++ compiler — installing g++"
            (apt-get update && apt-get install -y --no-install-recommends g++ make) \
              || (sudo apt-get update && sudo apt-get install -y --no-install-recommends g++ make) \
              || { echo "FATAL: no host C++ toolchain and cannot install one"; exit 1; }
          fi
          "$CMAKE" -S native -B native/build
          "$CMAKE" --build native/build
          (cd native/build && "$CTEST" --output-on-failure)

      - name: Constants single-source check
        run: |
          set -e
          bash tools/gen-proto.sh
          PK=app/src/main/kotlin/com/elodin/intercom/proto/Proto.kt
          if ! git diff --quiet -- "$PK"; then
            echo "FATAL: Proto.kt is stale — run tools/gen-proto.sh and commit it"
            git --no-pager diff -- "$PK"; exit 1
          fi
          BAD=0
          for lit in 0xFFFF b1f0c0de-1a2b-4c3d-8e5f-000000000001 b1f0c0de-1a2b-4c3d-8e5f-000000000002; do
            HITS=$(grep -RniF --include='*.kt' --exclude='Proto.kt' "$lit" app/src/main || true)
            if [ -n "$HITS" ]; then echo "FATAL: wire literal '$lit' re-declared outside Proto.kt:"; echo "$HITS"; BAD=1; fi
          done
          [ "$BAD" -eq 0 ] || exit 1
          echo "constants single-source OK"

      - name: Kotlin unit tests
        run: ./gradlew --no-daemon testDebugUnitTest

      - name: Build debug APK (NDK-backed)
        run: ./gradlew --no-daemon assembleDebug
