# Partial config — merged onto detekt's defaults via --build-upon-default-config.
# Keep this minimal; only override what genuinely fights our stack.
naming:
  FunctionNaming:
    # @Composable functions are PascalCase by convention.
    ignoreAnnotated: ['Composable']

style:
  ReturnCount:
    # Guard clauses are the house style: keep decisions flat instead of nesting
    # success paths under else blocks.
    max: 6
    excludeGuardClauses: true
